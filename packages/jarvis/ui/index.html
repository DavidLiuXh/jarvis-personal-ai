<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis - Personal AI Assistant</title>
    <!-- Libraries for Markdown and Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --error: #f87171;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 1rem 2rem;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--bg-hover);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 90%;
            padding: 1.25rem;
            border-radius: 1rem;
            line-height: 1.6;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user {
            align-self: flex-end;
            background-color: var(--accent);
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .jarvis {
            align-self: flex-start;
            background-color: var(--bg-card);
            border: 1px solid var(--bg-hover);
            border-bottom-left-radius: 0.25rem;
        }
        /* Markdown Styling */
        .markdown-body pre {
            background-color: #011627;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .markdown-body code {
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.9rem;
        }
        .markdown-body p { margin: 0.5rem 0; }
        .markdown-body ul, .markdown-body ol { padding-left: 1.5rem; }
        
        .thought-container {
            background-color: #0f172a;
            border-left: 4px solid #64748b;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            border-radius: 0.4rem;
            font-size: 0.9rem;
        }
        .thought-subject {
            font-weight: bold;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .thought-subject::before { content: '💭'; }
        .thought-desc {
            font-style: italic;
            color: #64748b;
        }
        .tool-container {
            background-color: #011627;
            border: 1px dashed var(--bg-hover);
            padding: 0.75rem 1rem;
            margin: 0.75rem 0;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .tool-header {
            color: var(--success);
            font-weight: bold;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tool-output {
            color: var(--text-muted);
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            background: #000;
            padding: 0.5rem;
            border-radius: 0.25rem;
        }
        footer {
            padding: 1.5rem 2rem;
            background-color: var(--bg-main);
            border-top: 1px solid var(--bg-hover);
        }
        .input-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 1rem;
            background: var(--bg-card);
            padding: 0.5rem;
            border-radius: 0.75rem;
            border: 1px solid var(--bg-hover);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 0.75rem 1rem;
            outline: none;
            font-size: 1rem;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        button:hover:not(:disabled) {
            background-color: #2563eb;
            transform: translateY(-1px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px currentColor;
        }
    </style>
</head>
<body>
    <header>
        <div style="font-size: 1.5rem; font-weight: bold; color: var(--accent); display: flex; align-items: center; gap: 0.5rem;">
            <span>🤖</span> Jarvis
        </div>
        <div id="status-container" style="font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; background: var(--bg-main); padding: 0.4rem 0.8rem; border-radius: 2rem;">
            <span id="status-dot" class="status-dot" style="color: var(--error); background-color: var(--error);"></span>
            <span id="status-text">Disconnected</span>
        </div>
    </header>

    <div id="chat-window">
        <!-- Messages will be injected here -->
    </div>

    <footer>
        <form id="chat-form" class="input-container">
            <input type="text" id="user-input" placeholder="Ask Jarvis to do something..." autocomplete="off">
            <button type="submit" id="send-btn">Send</button>
        </form>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const sendBtn = document.getElementById('send-btn');
        
        let ws;
        let currentResponseEl = null;
        let currentMarkdownBuffer = '';
        let lastThoughtSubject = '';

        // Get or create Session ID
        let sessionId = localStorage.getItem('jarvis_session_id');
        if (!sessionId) {
            sessionId = 'session-' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('jarvis_session_id', sessionId);
        }

        // Configure marked to use highlight.js
        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        function appendMessage(role, content, isHistory = false) {
            const msgEl = document.createElement('div');
            msgEl.className = `message ${role}`;
            if (isHistory) msgEl.style.opacity = '0.7';
            
            const mdContainer = document.createElement('div');
            mdContainer.className = 'markdown-body';
            mdContainer.innerHTML = marked.parse(content);
            msgEl.appendChild(mdContainer);
            
            chatWindow.appendChild(msgEl);
            mdContainer.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onopen = () => {
                statusText.innerText = 'Online';
                statusDot.style.color = 'var(--success)';
                statusDot.style.backgroundColor = 'var(--success)';
                sendBtn.disabled = false;
                
                // Request history restoration
                ws.send(JSON.stringify({ type: 'restore', sessionId: sessionId }));
            };

            ws.onclose = () => {
                statusText.innerText = 'Offline - Reconnecting...';
                statusDot.style.color = 'var(--error)';
                statusDot.style.backgroundColor = 'var(--error)';
                sendBtn.disabled = true;
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                
                if (msg.type === 'history') {
                    chatWindow.innerHTML = '';
                    msg.payload.forEach(m => {
                        appendMessage(m.role, m.content, true);
                    });
                }
                else if (msg.type === 'stream') {
                    const eventData = msg.payload;
                    
                    if (!currentResponseEl) {
                        // NEW STREAM STARTED: Reset buffer to prevent duplication
                        currentMarkdownBuffer = '';
                        lastThoughtSubject = '';
                        
                        currentResponseEl = document.createElement('div');
                        currentResponseEl.className = 'message jarvis';
                        const mdContainer = document.createElement('div');
                        mdContainer.className = 'markdown-body';
                        currentResponseEl.appendChild(mdContainer);
                        chatWindow.appendChild(currentResponseEl);
                    }

                    const mdContainer = currentResponseEl.querySelector('.markdown-body');

                    if (eventData.type === 'content') {
                        // Prevent identical back-to-back chunks if the model/server glitches
                        if (currentMarkdownBuffer.endsWith(eventData.value)) {
                            console.warn('Deduplicated identical chunk:', eventData.value);
                            return;
                        }
                        
                        currentMarkdownBuffer += eventData.value;
                        mdContainer.innerHTML = marked.parse(currentMarkdownBuffer);
                        mdContainer.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                    } 
                    else if (eventData.type === 'thought') {
                        const thought = eventData.value;
                        if (thought.subject !== lastThoughtSubject) {
                            const thoughtContainer = document.createElement('div');
                            thoughtContainer.className = 'thought-container';
                            thoughtContainer.innerHTML = `<div class="thought-subject">${thought.subject}</div><div class="thought-desc">${thought.description || ''}</div>`;
                            currentResponseEl.insertBefore(thoughtContainer, mdContainer);
                            lastThoughtSubject = thought.subject;
                        } else {
                            const lastThoughtDesc = currentResponseEl.querySelector('.thought-container:last-child .thought-desc');
                            if (lastThoughtDesc && thought.description) {
                                lastThoughtDesc.innerText = thought.description;
                            }
                        }
                    }
                    else if (eventData.type === 'tool_call_request') {
                        const tool = eventData.value;
                        const toolEl = document.createElement('div');
                        toolEl.className = 'tool-container';
                        toolEl.id = 'tool-' + tool.callId;
                        toolEl.innerHTML = `<div class="tool-header">🛠️ Invoking ${tool.name}...</div><div class="tool-args" style="color: #64748b; font-size: 0.75rem; margin-bottom: 0.5rem;">Args: ${JSON.stringify(tool.args)}</div>`;
                        currentResponseEl.insertBefore(toolEl, mdContainer);
                    }
                    else if (eventData.type === 'tool_call_response' || eventData.type === 'tool_call_finished') {
                        const toolResult = eventData.value;
                        const toolEl = document.getElementById('tool-' + toolResult.callId) || currentResponseEl.querySelector('.tool-container:last-child');
                        if (toolEl && !toolEl.querySelector('.tool-output')) {
                            toolEl.innerHTML += `<div class="tool-header" style="color: var(--accent);">✅ Execution Complete</div><div class="tool-output">${toolResult.output || 'Success'}</div>`;
                        }
                    }
                    
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                } else if (msg.type === 'done') {
                    currentResponseEl = null;
                    currentMarkdownBuffer = '';
                    lastThoughtSubject = '';
                    sendBtn.disabled = false;
                } else if (msg.type === 'error') {
                    const errorEl = document.createElement('div');
                    errorEl.className = 'message jarvis';
                    errorEl.style.color = 'var(--error)';
                    errorEl.innerHTML = `<strong>Error:</strong> ${msg.message}`;
                    chatWindow.appendChild(errorEl);
                    sendBtn.disabled = false;
                }
            };
        }

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

            appendMessage('user', text);
            
            sendBtn.disabled = true;
            ws.send(JSON.stringify({ 
                type: 'chat', 
                payload: text,
                sessionId: sessionId 
            }));
            userInput.value = '';
        };

        connect();
    </script>
</body>
</html>
